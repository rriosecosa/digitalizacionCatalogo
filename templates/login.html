<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Catálogo</title>
    <style>
      body {
        font-family: Arial;
        background: #f3f3f3;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .login-card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 350px;
      }
      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: #666;
        font-size: 14px;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #0d6efd;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        margin-top: 10px;
      }
      button:hover {
        background: #0b5ed7;
      }
      .error {
        color: red;
        font-size: 14px;
        margin-bottom: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>Iniciar Sesión</h2>

      {# Si usas backend para manejar errores de login #} {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form action="/login" method="POST">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit">Ingresar</button>
      </form>
    </div>
  </body>
</html>
