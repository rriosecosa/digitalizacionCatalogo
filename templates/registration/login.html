{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Catálogo Ecosa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="login-wrapper">
    <div class="login-container">
        <div class="login-left">
            <div class="brand-content">
                <div class="logo-icon">
                    <i class="bi bi-journal-richtext"></i>
                </div>
                <h1>BIENVENIDOS<br>A ECOSA</h1>
                <p>Digitalización de Catálogos Simplificada.</p>
            </div>
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
        </div>

        <div class="login-right">
            <div class="form-header">
                <h2>Iniciar Sesión</h2>
                <p>Ingresa tus credenciales para continuar</p>
            </div>
            
            {% if form.errors %}
                <div class="error-msg">
                    <i class="bi bi-exclamation-octagon"></i> Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Usuario</label>
                    <div class="input-wrapper">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" name="username" id="id_username" placeholder="Ingresa tu usuario" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="id_password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" name="password" id="id_password" placeholder="Ingresa tu contraseña" required>
                    </div>
                </div>
                
              

                <button type="submit" class="btn-login">
                    Ingresar <i class="bi bi-arrow-right-short"></i>
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
