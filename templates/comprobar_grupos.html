<!doctype html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Comprobación de grupos</title>

<style>

body{
    font-family:Arial;
    margin:30px;
}

.grupo{
    border:1px solid #ccc;
    margin-bottom:25px;
    padding:15px;
}

h2{
    background:#333;
    color:white;
    padding:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    border:1px solid #ddd;
    padding:6px;
}

th{
    background:#eee;
}

</style>

</head>

<body>

<h1>Productos agrupados</h1>

{% for nombre, productos in grupos.items %}

<div class="grupo">

<h2>

{{ nombre }}

({{ productos|length }} variantes)

</h2>

<table>

<tr>

<th>Código</th>

<th>Descripción</th>

<th>Variante</th>

</tr>

{% for p in productos %}

<tr>

<td>{{ p.codigo }}</td>

<td>{{ p.descripcion }}</td>

<td>{{ p.variante }}</td>

</tr>

{% endfor %}

</table>

</div>

{% endfor %}

</body>

</html>
